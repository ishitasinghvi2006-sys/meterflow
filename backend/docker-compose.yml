version: '3.8'

services:
  backend:
    build: .
    ports:
      - "10000:10000"
    environment:
      - PORT=10000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - NODE_ENV=production
    restart: unless-stopped